<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do-App</title>

    <link rel="stylesheet" href="./styles/main.css">
    <link rel="stylesheet" href="./styles/reset.css">
</head>
<body>
    <div class="wrap">
        <header>
            <h1>To-Do-App</h1>
            <p>12, Thursday, 2026</p>
        </header>
        <main class="main-container">
            <article class="add-task-container">
                <form method="post" class="add-task-form">
                    <input type="text" name="task" id="task-input" placeholder="Add a new task...">
                    <button class="add-task-btn" type="submit">Add task</button>
                </form>
            </article>

            <article class="info-container">
                <div class="all-info">All<span class="task-count">0</span></div>
                <div class="active-info">Active<span class="active-count">0</span></div>
                <div class="done-info">Done<span class="done-count">0</span></div>
            </article>
            
            <article class="filter-container">
                <button type="button" class="all-filter">All</button>
                <button type="button" class="active-filter">Active</button>
                <button type="button" class="done-filter">Done</button>
            </article>

            <article class="task-container">
                <!-- Tasks will be rendered here -->
            </article>

            <button type="button" class="clear-complete-btn">Clear complete</button>
        </main>
    </div>

    <script src="./scripts/app.js" type="module"></script>
</body>
</html>
